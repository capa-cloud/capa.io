{{ if .IsHome }}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ========================================
   Capa Homepage — Apple HIG Aesthetic
   v3.0 — Restraint, clarity, confidence
   ======================================== */

:root {
  --apple-black: #1d1d1f;
  --apple-gray: #86868b;
  --apple-gray-2: #6e6e73;
  --apple-gray-light: #d2d2d7;
  --apple-blue: #0071e3;
  --apple-blue-hover: #0077ed;
  --apple-bg: #f5f5f7;
  --apple-white: #fbfbfd;
  --apple-dark: #000;
  --apple-font: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --apple-mono: 'JetBrains Mono', 'SF Mono', ui-monospace, Menlo, monospace;
  --apple-ease: cubic-bezier(0.25, 0.46, 0.45, 0.94);
  --apple-spring: cubic-bezier(0.175, 0.885, 0.32, 1.1);
  --content-max: 980px;
}

/* ---------- Resets ---------- */
.td-home .td-main { padding-top: 0 !important; }
body.td-home .td-outer { padding-top: 0 !important; }
body.td-home .td-cover-block { display: none !important; }
body.td-home {
  font-family: var(--apple-font);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  color: var(--apple-black);
}

/* ---------- Navbar ---------- */
body.td-home .td-navbar {
  background: rgba(0, 0, 0, 0.72) !important;
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-bottom: 0.5px solid rgba(255, 255, 255, 0.08);
  box-shadow: none;
  height: 48px;
  min-height: 48px;
}
body.td-home .td-navbar .container-fluid {
  max-width: 1024px;
  padding: 0 22px;
}
body.td-home .td-navbar .navbar-brand__name {
  font-family: var(--apple-font);
  font-weight: 600;
  font-size: 1.05rem;
  color: rgba(255, 255, 255, 0.92) !important;
  letter-spacing: -0.2px;
}
body.td-home .td-navbar .navbar-brand__logo svg {
  width: 22px;
  height: 22px;
  color: #fff;
  opacity: 0.92;
}
body.td-home .td-navbar .nav-link {
  color: rgba(255, 255, 255, 0.56) !important;
  font-family: var(--apple-font);
  font-weight: 400;
  font-size: 0.75rem;
  letter-spacing: 0;
  transition: color 0.3s ease;
  padding: 0 12px !important;
}
body.td-home .td-navbar .nav-link:hover {
  color: rgba(255, 255, 255, 0.92) !important;
}
body.td-home .td-navbar .nav-link.active {
  color: rgba(255, 255, 255, 0.8) !important;
}
body.td-home .td-navbar .dropdown-toggle {
  color: rgba(255, 255, 255, 0.56) !important;
  font-size: 0.75rem;
}
body.td-home .td-navbar .dropdown-toggle:hover {
  color: rgba(255, 255, 255, 0.92) !important;
}
body.td-home .td-navbar .td-search__input {
  background: rgba(255, 255, 255, 0.1) !important;
  border: none !important;
  color: rgba(255, 255, 255, 0.8) !important;
  border-radius: 6px;
  font-size: 0.75rem;
  font-family: var(--apple-font);
  height: 30px;
  padding: 0 10px 0 28px;
}
body.td-home .td-navbar .td-search__input::placeholder {
  color: rgba(255, 255, 255, 0.4);
}
body.td-home .td-navbar .td-search__input:focus {
  background: rgba(255, 255, 255, 0.16) !important;
  outline: none;
  box-shadow: none;
}
body.td-home .td-navbar .td-search__icon::before {
  color: rgba(255, 255, 255, 0.4);
}

/* ---------- Scroll Reveal ---------- */
.capa-reveal {
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.8s var(--apple-ease), transform 0.8s var(--apple-ease);
}
.capa-reveal.is-visible {
  opacity: 1;
  transform: translateY(0);
}
.capa-reveal-delay-1 { transition-delay: 0.12s; }
.capa-reveal-delay-2 { transition-delay: 0.24s; }
.capa-reveal-delay-3 { transition-delay: 0.36s; }

/* ---------- Hero ---------- */
.capa-hero {
  position: relative;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  background: var(--apple-dark);
}

.capa-hero__bg {
  position: absolute;
  inset: 0;
  background-image: url('{{ "images/homepage/hero-bg.png" | absURL }}');
  background-size: cover;
  background-position: center 30%;
  opacity: 0.3;
}

.capa-hero__overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg,
    rgba(0,0,0,0.2) 0%,
    rgba(0,0,0,0.1) 40%,
    rgba(0,0,0,0.6) 85%,
    rgba(0,0,0,0.85) 100%
  );
}

.capa-hero__content {
  position: relative;
  z-index: 2;
  text-align: center;
  padding: 2rem;
  max-width: 780px;
}

.capa-hero__eyebrow {
  font-size: 0.9rem;
  font-weight: 400;
  color: var(--apple-gray-light);
  margin-bottom: 1rem;
  letter-spacing: 0;
  animation: fadeIn 1s var(--apple-ease);
}

.capa-hero__title {
  font-family: var(--apple-font);
  font-size: clamp(3.2rem, 7vw, 5rem);
  font-weight: 700;
  color: #fff;
  letter-spacing: -0.04em;
  line-height: 1.05;
  margin-bottom: 0.6rem;
  animation: fadeIn 1s var(--apple-ease) 0.1s both;
}

.capa-hero__title em {
  font-style: normal;
  background: linear-gradient(90deg, #2997ff 0%, #5ac8fa 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.capa-hero__subtitle {
  font-size: clamp(1.05rem, 2vw, 1.3rem);
  color: var(--apple-gray);
  max-width: 500px;
  margin: 0 auto 2.8rem;
  line-height: 1.5;
  font-weight: 400;
  letter-spacing: -0.01em;
  animation: fadeIn 1s var(--apple-ease) 0.2s both;
}

.capa-hero__actions {
  display: flex;
  gap: 16px;
  justify-content: center;
  flex-wrap: wrap;
  animation: fadeIn 1s var(--apple-ease) 0.35s both;
}

/* ---------- Buttons (Apple-style) ---------- */
.capa-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 12px 24px;
  border-radius: 980px;
  font-family: var(--apple-font);
  font-size: 0.94rem;
  font-weight: 400;
  text-decoration: none !important;
  transition: all 0.4s var(--apple-ease);
  border: none;
  cursor: pointer;
  letter-spacing: -0.01em;
}
.capa-btn i {
  font-size: 0.8em;
}

.capa-btn--primary {
  background: var(--apple-blue);
  color: #fff !important;
}
.capa-btn--primary:hover {
  background: var(--apple-blue-hover);
  color: #fff !important;
  transform: scale(1.02);
}

.capa-btn--secondary {
  background: transparent;
  color: var(--apple-blue) !important;
  padding: 12px 4px;
}
.capa-btn--secondary:hover {
  color: var(--apple-blue-hover) !important;
  text-decoration: underline !important;
}

.capa-btn--outline {
  background: rgba(255,255,255,0.04);
  color: rgba(255,255,255,0.88) !important;
  border: 1px solid rgba(255,255,255,0.16);
}
.capa-btn--outline:hover {
  background: rgba(255,255,255,0.12);
  color: #fff !important;
}

/* Hero scroll indicator */
.capa-hero__scroll {
  position: absolute;
  bottom: 2rem;
  left: 50%;
  transform: translateX(-50%);
  z-index: 2;
  width: 24px;
  height: 40px;
  border: 2px solid rgba(255,255,255,0.2);
  border-radius: 12px;
  animation: fadeIn 1s var(--apple-ease) 1s both;
}
.capa-hero__scroll::after {
  content: '';
  width: 3px;
  height: 8px;
  background: rgba(255,255,255,0.4);
  border-radius: 2px;
  position: absolute;
  top: 6px;
  left: 50%;
  transform: translateX(-50%);
  animation: scrollPulse 2.5s ease-in-out infinite 1.5s;
}

/* ---------- Sections (shared) ---------- */
.capa-section-label {
  font-family: var(--apple-font);
  font-size: 1rem;
  font-weight: 600;
  color: var(--apple-blue);
  margin-bottom: 0.25rem;
  letter-spacing: -0.01em;
}

.capa-section-title {
  font-family: var(--apple-font);
  font-size: clamp(2rem, 3.5vw, 2.8rem);
  font-weight: 700;
  color: var(--apple-black);
  margin-bottom: 0.5rem;
  letter-spacing: -0.03em;
  line-height: 1.1;
}

.capa-section-desc {
  font-size: 1.06rem;
  color: var(--apple-gray-2);
  max-width: 540px;
  margin: 0 auto 3rem;
  line-height: 1.55;
  letter-spacing: -0.01em;
}

/* ---------- Architecture ---------- */
.capa-arch {
  padding: 100px 24px 60px;
  background: var(--apple-bg);
  text-align: center;
}

.capa-arch__img {
  max-width: 640px;
  margin: 0 auto;
  border-radius: 16px;
  overflow: hidden;
  background: #fff;
  box-shadow: 0 4px 24px rgba(0,0,0,0.06), 0 0 0 0.5px rgba(0,0,0,0.04);
  transition: transform 0.6s var(--apple-ease), box-shadow 0.6s var(--apple-ease);
}
.capa-arch__img:hover {
  transform: scale(1.01);
  box-shadow: 0 8px 40px rgba(0,0,0,0.1), 0 0 0 0.5px rgba(0,0,0,0.06);
}
.capa-arch__img img {
  width: 100%;
  height: auto;
  display: block;
}

/* ---------- Features ---------- */
.capa-features {
  padding: 40px 24px 100px;
  background: var(--apple-bg);
}

.capa-features__grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  max-width: var(--content-max);
  margin: 0 auto;
}

.capa-feature {
  text-align: center;
  padding: 40px 28px;
  border-radius: 20px;
  background: #fff;
  transition: transform 0.4s var(--apple-ease), box-shadow 0.4s var(--apple-ease);
}
.capa-feature:hover {
  transform: scale(1.02);
  box-shadow: 0 8px 32px rgba(0,0,0,0.06);
}

.capa-feature__icon {
  width: 48px;
  height: 48px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.3rem;
  margin: 0 auto 16px;
}

.capa-feature__title {
  font-family: var(--apple-font);
  font-size: 1.15rem;
  font-weight: 600;
  color: var(--apple-black);
  margin-bottom: 8px;
  letter-spacing: -0.02em;
}

.capa-feature__desc {
  font-size: 0.88rem;
  color: var(--apple-gray-2);
  line-height: 1.55;
}

/* ---------- Article ---------- */
.capa-article {
  padding: 100px 24px;
  background: var(--apple-dark);
  position: relative;
  overflow: hidden;
}

.capa-article__card {
  max-width: 860px;
  margin: 0 auto;
  background: #1c1c1e;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  transition: transform 0.6s var(--apple-ease);
}
.capa-article__card:hover {
  transform: scale(1.01);
}

.capa-article__cover {
  width: 100%;
  height: 340px;
  object-fit: cover;
  display: block;
}

.capa-article__body {
  padding: 32px 36px 40px;
}

.capa-article__title {
  font-family: var(--apple-font);
  font-size: 1.7rem;
  font-weight: 700;
  color: #f5f5f7;
  margin-bottom: 12px;
  line-height: 1.25;
  letter-spacing: -0.02em;
}
.capa-article__title a {
  color: #f5f5f7;
  text-decoration: none !important;
  transition: color 0.3s ease;
}
.capa-article__title a:hover {
  color: #2997ff;
}

.capa-article__excerpt {
  font-size: 0.94rem;
  color: var(--apple-gray);
  line-height: 1.65;
  margin-bottom: 20px;
}

.capa-article__tags {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 28px;
}
.capa-article__tag {
  background: rgba(255,255,255,0.06);
  color: var(--apple-gray-light);
  padding: 4px 12px;
  border-radius: 980px;
  font-size: 0.72rem;
  font-weight: 500;
  letter-spacing: 0;
}

/* ---------- Code Section ---------- */
.capa-code {
  padding: 100px 24px;
  background: #fff;
}

.capa-code__grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 48px;
  max-width: var(--content-max);
  margin: 0 auto;
  align-items: center;
}

.capa-code__block {
  background: #1c1c1e;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 8px 32px rgba(0,0,0,0.12);
  transition: transform 0.4s var(--apple-ease);
}
.capa-code__block:hover {
  transform: translateY(-2px);
}

.capa-code__header {
  background: #2c2c2e;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.capa-code__dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
}

.capa-code__pre {
  padding: 20px 24px;
  font-family: var(--apple-mono);
  font-size: 0.78rem;
  line-height: 1.75;
  color: #e5e5ea;
  overflow-x: auto;
  margin: 0;
}

.capa-code__right-title {
  font-family: var(--apple-font);
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--apple-black);
  margin-bottom: 24px;
  letter-spacing: -0.03em;
}

.capa-code__list {
  list-style: none;
  padding: 0;
  margin: 0;
}
.capa-code__list li {
  padding: 14px 0;
  font-size: 1rem;
  color: var(--apple-gray-2);
  display: flex;
  align-items: center;
  gap: 14px;
  border-bottom: 0.5px solid #e5e5ea;
  transition: color 0.3s ease;
  letter-spacing: -0.01em;
}
.capa-code__list li:last-child {
  border-bottom: none;
}
.capa-code__list li:hover {
  color: var(--apple-black);
}
.capa-code__list .check {
  color: #34c759;
  font-size: 1rem;
  flex-shrink: 0;
}

/* ---------- Community ---------- */
.capa-community {
  padding: 100px 24px;
  background: var(--apple-bg);
  text-align: center;
}

.capa-community__grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  max-width: 800px;
  margin: 0 auto;
}

.capa-community__card {
  background: #fff;
  border-radius: 20px;
  padding: 36px 24px;
  text-decoration: none !important;
  color: inherit !important;
  box-shadow: 0 2px 12px rgba(0,0,0,0.04);
  transition: transform 0.4s var(--apple-ease), box-shadow 0.4s var(--apple-ease);
}
.capa-community__card:hover {
  transform: scale(1.03);
  box-shadow: 0 8px 32px rgba(0,0,0,0.08);
}

.capa-community__icon {
  font-size: 1.6rem;
  margin-bottom: 12px;
  color: var(--apple-blue);
}
.capa-community__card h4 {
  font-family: var(--apple-font);
  font-size: 1.05rem;
  font-weight: 600;
  color: var(--apple-black);
  margin-bottom: 6px;
  letter-spacing: -0.02em;
}
.capa-community__card p {
  font-size: 0.85rem;
  color: var(--apple-gray-2);
  margin: 0;
  line-height: 1.5;
}

/* ---------- Footer ---------- */
footer.td-footer {
  background: var(--apple-dark) !important;
  border-top: 0.5px solid #424245;
}

/* ---------- Animations ---------- */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes scrollPulse {
  0% { opacity: 1; top: 6px; }
  50% { opacity: 0; top: 22px; }
  100% { opacity: 0; top: 22px; }
}

/* ---------- Responsive ---------- */
@media (max-width: 768px) {
  .capa-features__grid,
  .capa-community__grid {
    grid-template-columns: 1fr;
    max-width: 400px;
    margin-left: auto;
    margin-right: auto;
  }
  .capa-code__grid {
    grid-template-columns: 1fr;
    gap: 32px;
  }
  .capa-article__cover { height: 200px; }
  .capa-article__body { padding: 24px; }
  .capa-hero { min-height: 90vh; }
  .capa-arch,
  .capa-article,
  .capa-code,
  .capa-community {
    padding: 72px 20px;
  }
}

@media (max-width: 480px) {
  .capa-hero__actions {
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  .capa-btn {
    width: 100%;
    max-width: 240px;
    justify-content: center;
  }
  .capa-article__title { font-size: 1.4rem; }
  .capa-section-title { font-size: 1.8rem; }
}
</style>
{{ end }}
