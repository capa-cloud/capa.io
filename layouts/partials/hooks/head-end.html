{{ if .IsHome }}
<!-- Google Fonts: Outfit (display) + Source Han Sans fallback for CJK -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ========================================
   Capa Homepage — Polished Tech Aesthetic
   v2.0 — Scroll animations, typography,
   section transitions, depth & texture
   ======================================== */

/* ---------- CSS Variables ---------- */
:root {
  --capa-navy: #080c1f;
  --capa-indigo: #111638;
  --capa-blue: #4f6cff;
  --capa-blue-light: #6b85ff;
  --capa-cyan: #00d4ff;
  --capa-dark: #0b0f22;
  --capa-text: #c9d1d9;
  --capa-muted: #8b949e;
  --capa-surface: #141832;
  --capa-glow: rgba(79, 108, 255, 0.15);
  --capa-font: 'Outfit', -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --capa-mono: 'JetBrains Mono', 'Fira Code', 'SF Mono', Consolas, monospace;
  --capa-ease: cubic-bezier(0.4, 0, 0.2, 1);
  --capa-ease-out: cubic-bezier(0, 0, 0.2, 1);
}

/* ---------- Global homepage overrides ---------- */
.td-home .td-main { padding-top: 0 !important; }
body.td-home .td-outer { padding-top: 0 !important; }
body.td-home .td-cover-block { display: none !important; }
body.td-home {
  font-family: var(--capa-font);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ---------- Navbar — glassmorphic over hero ---------- */
body.td-home .td-navbar {
  background: rgba(8, 12, 31, 0.55) !important;
  backdrop-filter: blur(16px) saturate(1.4);
  -webkit-backdrop-filter: blur(16px) saturate(1.4);
  border-bottom: 1px solid rgba(255, 255, 255, 0.06);
  box-shadow: 0 1px 24px rgba(0, 0, 0, 0.12);
  transition: background 0.3s ease, box-shadow 0.3s ease;
}
body.td-home .td-navbar .navbar-brand__name {
  font-family: var(--capa-font);
  font-weight: 800;
  font-size: 1.15rem;
  color: #fff !important;
  letter-spacing: -0.3px;
}
body.td-home .td-navbar .navbar-brand__logo svg {
  width: 24px;
  height: 24px;
  color: var(--capa-cyan);
}
body.td-home .td-navbar .nav-link {
  color: rgba(255, 255, 255, 0.7) !important;
  font-family: var(--capa-font);
  font-weight: 500;
  font-size: 0.88rem;
  transition: color 0.2s ease;
}
body.td-home .td-navbar .nav-link:hover,
body.td-home .td-navbar .nav-link.active {
  color: #fff !important;
}
body.td-home .td-navbar .dropdown-toggle {
  color: rgba(255, 255, 255, 0.7) !important;
}
body.td-home .td-navbar .dropdown-toggle:hover {
  color: #fff !important;
}
/* Search box styling in navbar */
body.td-home .td-navbar .td-search__input {
  background: rgba(255, 255, 255, 0.06) !important;
  border: 1px solid rgba(255, 255, 255, 0.1) !important;
  color: rgba(255, 255, 255, 0.8) !important;
  border-radius: 8px;
  font-size: 0.82rem;
  font-family: var(--capa-font);
  transition: all 0.25s ease;
}
body.td-home .td-navbar .td-search__input::placeholder {
  color: rgba(255, 255, 255, 0.35);
}
body.td-home .td-navbar .td-search__input:focus {
  background: rgba(255, 255, 255, 0.1) !important;
  border-color: rgba(79, 108, 255, 0.4) !important;
  box-shadow: 0 0 0 3px rgba(79, 108, 255, 0.12);
  outline: none;
}
body.td-home .td-navbar .td-search__icon::before {
  color: rgba(255, 255, 255, 0.4);
}

/* ---------- Scroll Reveal ---------- */
.capa-reveal {
  opacity: 0;
  transform: translateY(36px);
  transition: opacity 0.75s var(--capa-ease-out), transform 0.75s var(--capa-ease-out);
}
.capa-reveal.is-visible {
  opacity: 1;
  transform: translateY(0);
}
.capa-reveal-delay-1 { transition-delay: 0.1s; }
.capa-reveal-delay-2 { transition-delay: 0.2s; }
.capa-reveal-delay-3 { transition-delay: 0.3s; }

/* ---------- Hero Section ---------- */
.capa-hero {
  position: relative;
  min-height: 96vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  background: var(--capa-navy);
}

.capa-hero__bg {
  position: absolute;
  inset: 0;
  background-image: url('{{ "images/homepage/hero-bg.png" | absURL }}');
  background-size: cover;
  background-position: center 30%;
  opacity: 0.55;
  animation: heroZoom 25s ease-in-out infinite alternate;
}

.capa-hero__overlay {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 35%, rgba(79,108,255,0.12) 0%, transparent 70%),
    radial-gradient(ellipse 60% 50% at 80% 70%, rgba(0,212,255,0.06) 0%, transparent 60%),
    linear-gradient(180deg, rgba(8,12,31,0.1) 0%, rgba(8,12,31,0.65) 75%, rgba(8,12,31,0.97) 100%);
}

/* Animated grid lines on hero */
.capa-hero__grid {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(79,108,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(79,108,255,0.03) 1px, transparent 1px);
  background-size: 60px 60px;
  mask-image: radial-gradient(ellipse 70% 60% at 50% 40%, black 0%, transparent 70%);
  -webkit-mask-image: radial-gradient(ellipse 70% 60% at 50% 40%, black 0%, transparent 70%);
  animation: gridDrift 20s linear infinite;
}

.capa-hero__content {
  position: relative;
  z-index: 2;
  text-align: center;
  padding: 2rem;
  max-width: 860px;
}

.capa-hero__badge {
  display: inline-block;
  padding: 7px 24px;
  border-radius: 20px;
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 3.5px;
  text-transform: uppercase;
  color: var(--capa-cyan);
  border: 1px solid rgba(0,212,255,0.18);
  background: rgba(0,212,255,0.04);
  margin-bottom: 2rem;
  backdrop-filter: blur(10px);
  animation: fadeInDown 0.8s var(--capa-ease-out);
}

.capa-hero__title {
  font-family: var(--capa-font);
  font-size: clamp(2.8rem, 6vw, 4.2rem);
  font-weight: 900;
  color: #fff;
  letter-spacing: -2px;
  line-height: 1.08;
  margin-bottom: 1.4rem;
  animation: fadeInDown 0.8s var(--capa-ease-out) 0.1s both;
}

.capa-hero__title em {
  font-style: normal;
  background: linear-gradient(135deg, #7b93ff 0%, var(--capa-cyan) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.capa-hero__subtitle {
  font-size: clamp(1rem, 2vw, 1.18rem);
  color: rgba(255,255,255,0.55);
  max-width: 540px;
  margin: 0 auto 2.5rem;
  line-height: 1.8;
  font-weight: 400;
  animation: fadeInDown 0.8s var(--capa-ease-out) 0.2s both;
}

.capa-hero__actions {
  display: flex;
  gap: 14px;
  justify-content: center;
  flex-wrap: wrap;
  animation: fadeInUp 0.8s var(--capa-ease-out) 0.35s both;
}

/* ---------- Buttons ---------- */
.capa-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 13px 30px;
  border-radius: 10px;
  font-family: var(--capa-font);
  font-size: 0.9rem;
  font-weight: 600;
  text-decoration: none !important;
  transition: all 0.28s var(--capa-ease);
  border: none;
  cursor: pointer;
  position: relative;
  overflow: hidden;
}

.capa-btn--primary {
  background: linear-gradient(135deg, var(--capa-blue) 0%, #3a4fd9 100%);
  color: #fff !important;
  box-shadow: 0 4px 24px rgba(79,108,255,0.3), inset 0 1px 0 rgba(255,255,255,0.1);
}
.capa-btn--primary::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, transparent 0%, rgba(255,255,255,0.1) 100%);
  opacity: 0;
  transition: opacity 0.3s ease;
}
.capa-btn--primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 36px rgba(79,108,255,0.5), inset 0 1px 0 rgba(255,255,255,0.15);
  color: #fff !important;
}
.capa-btn--primary:hover::after { opacity: 1; }

.capa-btn--outline {
  background: rgba(255,255,255,0.03);
  color: rgba(255,255,255,0.8) !important;
  border: 1px solid rgba(255,255,255,0.12);
  backdrop-filter: blur(4px);
}
.capa-btn--outline:hover {
  background: rgba(255,255,255,0.1);
  border-color: rgba(255,255,255,0.3);
  color: #fff !important;
  transform: translateY(-1px);
}

/* Hero scroll indicator */
.capa-hero__scroll {
  position: absolute;
  bottom: 2.5rem;
  left: 50%;
  transform: translateX(-50%);
  z-index: 2;
  animation: bounce 2.5s infinite 1.5s;
}
.capa-hero__scroll span {
  display: block;
  width: 22px;
  height: 36px;
  border: 2px solid rgba(255,255,255,0.15);
  border-radius: 11px;
  position: relative;
}
.capa-hero__scroll span::after {
  content: '';
  width: 3px;
  height: 7px;
  background: rgba(255,255,255,0.35);
  border-radius: 2px;
  position: absolute;
  top: 6px;
  left: 50%;
  transform: translateX(-50%);
  animation: scrollDot 2s infinite 1.5s;
}

/* ---------- Section Dividers ---------- */
.capa-divider {
  width: 100%;
  height: 1px;
  background: linear-gradient(90deg, transparent 0%, rgba(79,108,255,0.15) 50%, transparent 100%);
}
.capa-divider--wave {
  height: 80px;
  margin-top: -80px;
  position: relative;
  z-index: 1;
  pointer-events: none;
}

/* ---------- Shared Section Styles ---------- */
.capa-section-label {
  font-family: var(--capa-font);
  font-size: 0.68rem;
  font-weight: 700;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--capa-blue);
  margin-bottom: 0.65rem;
}

.capa-section-title {
  font-family: var(--capa-font);
  font-size: clamp(1.8rem, 3.2vw, 2.4rem);
  font-weight: 800;
  color: var(--capa-navy);
  margin-bottom: 0.65rem;
  letter-spacing: -0.8px;
}

.capa-section-desc {
  font-size: 1rem;
  color: #666;
  max-width: 560px;
  margin: 0 auto 2.5rem;
  line-height: 1.75;
}

/* ---------- Architecture Section ---------- */
.capa-arch {
  padding: 6rem 1.5rem 3rem;
  background:
    radial-gradient(ellipse 80% 60% at 50% 0%, rgba(79,108,255,0.04) 0%, transparent 50%),
    linear-gradient(180deg, #f4f6ff 0%, #fff 100%);
  text-align: center;
  position: relative;
}

.capa-arch__img {
  max-width: 660px;
  margin: 0 auto;
  border-radius: 20px;
  overflow: hidden;
  box-shadow:
    0 16px 56px rgba(79,108,255,0.1),
    0 2px 6px rgba(0,0,0,0.02);
  border: 1px solid rgba(79,108,255,0.06);
  transition: transform 0.4s var(--capa-ease), box-shadow 0.4s var(--capa-ease);
  position: relative;
}
.capa-arch__img::before {
  content: '';
  position: absolute;
  inset: -1px;
  border-radius: 20px;
  padding: 1px;
  background: linear-gradient(135deg, rgba(79,108,255,0.15), transparent 50%, rgba(0,212,255,0.1));
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  z-index: 1;
  pointer-events: none;
}
.capa-arch__img:hover {
  transform: translateY(-4px) scale(1.005);
  box-shadow:
    0 20px 64px rgba(79,108,255,0.14),
    0 4px 12px rgba(0,0,0,0.04);
}
.capa-arch__img img {
  width: 100%;
  height: auto;
  display: block;
}

/* ---------- Features Section ---------- */
.capa-features {
  padding: 3rem 1.5rem 5rem;
  background: #fff;
  position: relative;
}

.capa-features__grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1.5rem;
  max-width: 960px;
  margin: 0 auto;
}

.capa-feature {
  text-align: center;
  padding: 2.5rem 1.6rem;
  border-radius: 18px;
  border: 1px solid transparent;
  transition: all 0.35s var(--capa-ease);
  position: relative;
}
.capa-feature::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 18px;
  background: linear-gradient(135deg, rgba(79,108,255,0.04) 0%, rgba(0,212,255,0.02) 100%);
  opacity: 0;
  transition: opacity 0.35s ease;
}
.capa-feature:hover {
  border-color: rgba(79,108,255,0.1);
  transform: translateY(-6px);
  box-shadow: 0 20px 48px rgba(79,108,255,0.08);
}
.capa-feature:hover::before { opacity: 1; }

.capa-feature__icon {
  width: 56px;
  height: 56px;
  border-radius: 15px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.4rem;
  margin: 0 auto 1.2rem;
  transition: transform 0.35s var(--capa-ease);
  position: relative;
  z-index: 1;
}
.capa-feature:hover .capa-feature__icon {
  transform: scale(1.1) rotate(-3deg);
}

.capa-feature__title {
  font-family: var(--capa-font);
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--capa-navy);
  margin-bottom: 0.55rem;
  position: relative;
  z-index: 1;
}

.capa-feature__desc {
  font-size: 0.88rem;
  color: #777;
  line-height: 1.7;
  position: relative;
  z-index: 1;
}

/* ---------- Featured Article ---------- */
.capa-article {
  padding: 6rem 1.5rem;
  background: linear-gradient(180deg, var(--capa-navy) 0%, var(--capa-dark) 100%);
  position: relative;
  overflow: hidden;
}
/* Ambient glow orbs */
.capa-article::before,
.capa-article::after {
  content: '';
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
}
.capa-article::before {
  top: -150px;
  right: -150px;
  width: 450px;
  height: 450px;
  background: radial-gradient(circle, rgba(79,108,255,0.07) 0%, transparent 70%);
}
.capa-article::after {
  bottom: -100px;
  left: -100px;
  width: 350px;
  height: 350px;
  background: radial-gradient(circle, rgba(0,212,255,0.04) 0%, transparent 70%);
}

.capa-article__card {
  max-width: 880px;
  margin: 0 auto;
  background: linear-gradient(145deg, rgba(18,24,58,0.9), rgba(26,33,72,0.9));
  border-radius: 22px;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.05);
  box-shadow: 0 28px 72px rgba(0,0,0,0.35);
  transition: transform 0.4s var(--capa-ease), box-shadow 0.4s var(--capa-ease);
  position: relative;
  backdrop-filter: blur(20px);
}
.capa-article__card:hover {
  transform: translateY(-8px);
  box-shadow: 0 36px 88px rgba(0,0,0,0.45), 0 0 0 1px rgba(79,108,255,0.1);
}

.capa-article__cover {
  width: 100%;
  height: 320px;
  object-fit: cover;
  display: block;
  transition: transform 0.7s var(--capa-ease);
}
.capa-article__card:hover .capa-article__cover {
  transform: scale(1.03);
}

.capa-article__body {
  padding: 2.2rem 2.8rem 2.8rem;
}

.capa-article__title {
  font-family: var(--capa-font);
  font-size: 1.6rem;
  font-weight: 700;
  color: #fff;
  margin-bottom: 0.8rem;
  line-height: 1.35;
}
.capa-article__title a {
  color: #fff;
  text-decoration: none !important;
  transition: color 0.25s ease;
}
.capa-article__title a:hover {
  color: var(--capa-cyan);
}

.capa-article__excerpt {
  font-size: 0.92rem;
  color: var(--capa-muted);
  line-height: 1.8;
  margin-bottom: 1.6rem;
}

.capa-article__tags {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 2rem;
}
.capa-article__tag {
  background: rgba(79,108,255,0.1);
  color: var(--capa-blue-light);
  padding: 5px 14px;
  border-radius: 7px;
  font-size: 0.75rem;
  font-weight: 500;
  letter-spacing: 0.3px;
  transition: all 0.25s ease;
  border: 1px solid transparent;
}
.capa-article__tag:hover {
  background: rgba(79,108,255,0.18);
  border-color: rgba(79,108,255,0.15);
}

/* ---------- Code Section ---------- */
.capa-code {
  padding: 5rem 1.5rem;
  background:
    radial-gradient(ellipse 60% 40% at 30% 50%, rgba(79,108,255,0.02) 0%, transparent 50%),
    #fff;
  position: relative;
}

.capa-code__grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 3.5rem;
  max-width: 960px;
  margin: 0 auto;
  align-items: center;
}

.capa-code__block {
  background: #0d1117;
  border-radius: 16px;
  overflow: hidden;
  box-shadow:
    0 16px 48px rgba(0,0,0,0.12),
    0 0 0 1px rgba(255,255,255,0.04);
  transition: transform 0.35s var(--capa-ease), box-shadow 0.35s var(--capa-ease);
  position: relative;
}
/* Subtle glow on hover */
.capa-code__block::after {
  content: '';
  position: absolute;
  inset: -1px;
  border-radius: 16px;
  background: linear-gradient(135deg, rgba(79,108,255,0.15), transparent 50%, rgba(0,212,255,0.1));
  opacity: 0;
  transition: opacity 0.4s ease;
  z-index: 0;
  pointer-events: none;
}
.capa-code__block:hover {
  transform: translateY(-4px);
  box-shadow: 0 20px 56px rgba(0,0,0,0.18);
}
.capa-code__block:hover::after { opacity: 1; }

.capa-code__header {
  background: #161b22;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 7px;
  border-bottom: 1px solid #21262d;
  position: relative;
  z-index: 1;
}
.capa-code__dot {
  width: 11px;
  height: 11px;
  border-radius: 50%;
}

.capa-code__pre {
  padding: 1.4rem 1.5rem;
  font-family: var(--capa-mono);
  font-size: 0.78rem;
  line-height: 1.8;
  color: #c9d1d9;
  overflow-x: auto;
  margin: 0;
  position: relative;
  z-index: 1;
}

.capa-code__right-title {
  font-family: var(--capa-font);
  font-size: 1.35rem;
  font-weight: 700;
  color: var(--capa-navy);
  margin-bottom: 1.6rem;
  position: relative;
  padding-left: 16px;
}
.capa-code__right-title::before {
  content: '';
  position: absolute;
  left: 0;
  top: 3px;
  bottom: 3px;
  width: 4px;
  border-radius: 2px;
  background: linear-gradient(180deg, var(--capa-blue), var(--capa-cyan));
}

.capa-code__list {
  list-style: none;
  padding: 0;
  margin: 0;
}
.capa-code__list li {
  padding: 12px 0;
  font-size: 0.95rem;
  color: #444;
  display: flex;
  align-items: center;
  gap: 12px;
  border-bottom: 1px solid #f0f2f5;
  transition: padding-left 0.2s ease, color 0.2s ease;
}
.capa-code__list li:last-child {
  border-bottom: none;
}
.capa-code__list li:hover {
  padding-left: 6px;
  color: var(--capa-navy);
}
.capa-code__list .check {
  color: var(--capa-blue);
  font-weight: bold;
  font-size: 1.05rem;
  flex-shrink: 0;
}

/* ---------- Community Section ---------- */
.capa-community {
  padding: 5rem 1.5rem;
  background:
    radial-gradient(ellipse 60% 50% at 70% 80%, rgba(79,108,255,0.03) 0%, transparent 50%),
    linear-gradient(180deg, #f7f8ff 0%, #eef0ff 100%);
  text-align: center;
}

.capa-community__grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1.4rem;
  max-width: 800px;
  margin: 2.5rem auto 0;
}

.capa-community__card {
  background: #fff;
  border-radius: 16px;
  padding: 2rem 1.4rem;
  text-decoration: none !important;
  color: inherit !important;
  box-shadow: 0 2px 16px rgba(0,0,0,0.03);
  border: 1px solid rgba(79,108,255,0.05);
  transition: all 0.35s var(--capa-ease);
  position: relative;
  overflow: hidden;
}
/* Gradient border on hover */
.capa-community__card::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 16px;
  padding: 1px;
  background: linear-gradient(135deg, rgba(79,108,255,0.2), rgba(0,212,255,0.2));
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  opacity: 0;
  transition: opacity 0.35s ease;
}
.capa-community__card:hover {
  transform: translateY(-6px);
  box-shadow: 0 16px 40px rgba(79,108,255,0.1);
  border-color: transparent;
}
