{{ if .IsHome }}
<style>
/* ========================================
   Capa Homepage — Refined Dark Tech
   ======================================== */

/* ---------- CSS Variables ---------- */
:root {
  --capa-navy: #080c1f;
  --capa-indigo: #111638;
  --capa-blue: #4f6cff;
  --capa-blue-light: #6b85ff;
  --capa-cyan: #00d4ff;
  --capa-dark: #0b0f22;
  --capa-text: #c9d1d9;
  --capa-muted: #8b949e;
  --capa-surface: #141832;
  --capa-glow: rgba(79, 108, 255, 0.15);
}

/* ---------- Global homepage overrides ---------- */
.td-home .td-main { padding-top: 0 !important; }
body.td-home .td-outer { padding-top: 0 !important; }
body.td-home .td-cover-block { display: none !important; }

/* ---------- Hero Section ---------- */
.capa-hero {
  position: relative;
  min-height: 94vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  background: var(--capa-navy);
}

.capa-hero__bg {
  position: absolute;
  inset: 0;
  background-image: url('{{ "images/homepage/hero-bg.png" | absURL }}');
  background-size: cover;
  background-position: center 30%;
  opacity: 0.6;
}

.capa-hero__overlay {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 35%, rgba(79,108,255,0.1) 0%, transparent 70%),
    radial-gradient(ellipse 60% 50% at 80% 70%, rgba(0,212,255,0.05) 0%, transparent 60%),
    linear-gradient(180deg, rgba(8,12,31,0.15) 0%, rgba(8,12,31,0.7) 80%, rgba(8,12,31,0.95) 100%);
}

.capa-hero__content {
  position: relative;
  z-index: 2;
  text-align: center;
  padding: 2rem;
  max-width: 820px;
}

.capa-hero__badge {
  display: inline-block;
  padding: 6px 22px;
  border-radius: 20px;
  font-size: 0.72rem;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--capa-cyan);
  border: 1px solid rgba(0,212,255,0.2);
  background: rgba(0,212,255,0.04);
  margin-bottom: 1.8rem;
  backdrop-filter: blur(8px);
  animation: fadeInDown 0.7s ease-out;
}

.capa-hero__title {
  font-size: clamp(2.6rem, 5.5vw, 4rem);
  font-weight: 800;
  color: #fff;
  letter-spacing: -1.5px;
  line-height: 1.1;
  margin-bottom: 1.2rem;
  animation: fadeInDown 0.7s ease-out 0.08s both;
}

.capa-hero__title em {
  font-style: normal;
  background: linear-gradient(135deg, #7b93ff 0%, var(--capa-cyan) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.capa-hero__subtitle {
  font-size: clamp(1rem, 2vw, 1.2rem);
  color: rgba(255,255,255,0.6);
  max-width: 560px;
  margin: 0 auto 2.2rem;
  line-height: 1.7;
  font-weight: 400;
  animation: fadeInDown 0.7s ease-out 0.16s both;
}

.capa-hero__actions {
  display: flex;
  gap: 14px;
  justify-content: center;
  flex-wrap: wrap;
  animation: fadeInUp 0.7s ease-out 0.3s both;
}

.capa-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 13px 30px;
  border-radius: 10px;
  font-size: 0.92rem;
  font-weight: 600;
  text-decoration: none !important;
  transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  border: none;
  cursor: pointer;
}

.capa-btn--primary {
  background: linear-gradient(135deg, var(--capa-blue) 0%, #3a4fd9 100%);
  color: #fff !important;
  box-shadow: 0 4px 24px rgba(79,108,255,0.3), inset 0 1px 0 rgba(255,255,255,0.1);
}
.capa-btn--primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(79,108,255,0.45), inset 0 1px 0 rgba(255,255,255,0.15);
  color: #fff !important;
}

.capa-btn--outline {
  background: rgba(255,255,255,0.04);
  color: rgba(255,255,255,0.85) !important;
  border: 1px solid rgba(255,255,255,0.14);
  backdrop-filter: blur(4px);
}
.capa-btn--outline:hover {
  background: rgba(255,255,255,0.1);
  border-color: rgba(255,255,255,0.3);
  color: #fff !important;
  transform: translateY(-1px);
}

.capa-hero__scroll {
  position: absolute;
  bottom: 2.5rem;
  left: 50%;
  transform: translateX(-50%);
  z-index: 2;
  animation: bounce 2.5s infinite 1.5s;
}
.capa-hero__scroll span {
  display: block;
  width: 22px;
  height: 36px;
  border: 2px solid rgba(255,255,255,0.18);
  border-radius: 11px;
  position: relative;
}
.capa-hero__scroll span::after {
  content: '';
  width: 3px;
  height: 7px;
  background: rgba(255,255,255,0.4);
  border-radius: 2px;
  position: absolute;
  top: 6px;
  left: 50%;
  transform: translateX(-50%);
  animation: scrollDot 2s infinite 1.5s;
}

/* ---------- Architecture Section ---------- */
.capa-arch {
  padding: 5.5rem 1.5rem;
  background: linear-gradient(180deg, #f4f6ff 0%, #fff 100%);
  text-align: center;
}

.capa-section-label {
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--capa-blue);
  margin-bottom: 0.6rem;
}

.capa-section-title {
  font-size: clamp(1.7rem, 3vw, 2.3rem);
  font-weight: 800;
  color: var(--capa-navy);
  margin-bottom: 0.6rem;
  letter-spacing: -0.5px;
}

.capa-section-desc {
  font-size: 1rem;
  color: #666;
  max-width: 560px;
  margin: 0 auto 2.5rem;
  line-height: 1.7;
}

.capa-arch__img {
  max-width: 700px;
  margin: 0 auto;
  border-radius: 18px;
  overflow: hidden;
  box-shadow:
    0 12px 48px rgba(79,108,255,0.08),
    0 2px 6px rgba(0,0,0,0.03);
  border: 1px solid rgba(79,108,255,0.06);
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}
.capa-arch__img:hover {
  transform: translateY(-3px);
  box-shadow:
    0 16px 56px rgba(79,108,255,0.12),
    0 4px 12px rgba(0,0,0,0.04);
}
.capa-arch__img img {
  width: 100%;
  height: auto;
  display: block;
}

/* ---------- Features Section ---------- */
.capa-features {
  padding: 4.5rem 1.5rem;
  background: #fff;
}

.capa-features__grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1.5rem;
  max-width: 940px;
  margin: 0 auto;
}

.capa-feature {
  text-align: center;
  padding: 2.2rem 1.5rem;
  border-radius: 16px;
  border: 1px solid transparent;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
.capa-feature:hover {
  background: #f6f8ff;
  border-color: rgba(79,108,255,0.08);
  transform: translateY(-5px);
  box-shadow: 0 16px 40px rgba(79,108,255,0.07);
}

.capa-feature__icon {
  width: 54px;
  height: 54px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.4rem;
  margin: 0 auto 1.1rem;
  transition: transform 0.3s ease;
}
.capa-feature:hover .capa-feature__icon {
  transform: scale(1.08);
}

.capa-feature__title {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--capa-navy);
  margin-bottom: 0.5rem;
}

.capa-feature__desc {
  font-size: 0.88rem;
  color: #777;
  line-height: 1.65;
}

/* ---------- Featured Article ---------- */
.capa-article {
  padding: 5.5rem 1.5rem;
  background: linear-gradient(180deg, var(--capa-navy) 0%, var(--capa-dark) 100%);
  position: relative;
  overflow: hidden;
}
.capa-article::before {
  content: '';
  position: absolute;
  top: -200px;
  right: -200px;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(79,108,255,0.06) 0%, transparent 70%);
  pointer-events: none;
}

.capa-article__card {
  max-width: 860px;
  margin: 0 auto;
  background: linear-gradient(145deg, #12183a, #1a2148);
  border-radius: 20px;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.05);
  box-shadow: 0 24px 64px rgba(0,0,0,0.35);
  transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.35s ease;
  position: relative;
}
.capa-article__card:hover {
  transform: translateY(-6px);
  box-shadow: 0 32px 80px rgba(0,0,0,0.4), 0 0 0 1px rgba(79,108,255,0.08);
}

.capa-article__cover {
  width: 100%;
  height: 300px;
  object-fit: cover;
  display: block;
  transition: transform 0.6s ease;
}
.capa-article__card:hover .capa-article__cover {
  transform: scale(1.02);
}

.capa-article__body {
  padding: 2rem 2.5rem 2.5rem;
}

.capa-article__title {
  font-size: 1.55rem;
  font-weight: 700;
  color: #fff;
  margin-bottom: 0.75rem;
  line-height: 1.35;
}
.capa-article__title a {
  color: #fff;
  text-decoration: none !important;
  transition: color 0.2s ease;
}
.capa-article__title a:hover {
  color: var(--capa-cyan);
}

.capa-article__excerpt {
  font-size: 0.92rem;
  color: var(--capa-muted);
  line-height: 1.75;
  margin-bottom: 1.5rem;
}

.capa-article__tags {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 1.8rem;
}
.capa-article__tag {
  background: rgba(79,108,255,0.1);
  color: var(--capa-blue-light);
  padding: 5px 14px;
  border-radius: 6px;
  font-size: 0.76rem;
  font-weight: 500;
  letter-spacing: 0.3px;
  transition: background 0.2s ease;
}
.capa-article__tag:hover {
  background: rgba(79,108,255,0.18);
}

/* ---------- Code Section ---------- */
.capa-code {
  padding: 4.5rem 1.5rem;
  background: #fff;
}

.capa-code__grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 3rem;
  max-width: 940px;
  margin: 0 auto;
  align-items: center;
}

.capa-code__block {
  background: #0d1117;
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 12px 40px rgba(0,0,0,0.1);
  border: 1px solid #21262d;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}
.capa-code__block:hover {
  transform: translateY(-3px);
  box-shadow: 0 16px 48px rgba(0,0,0,0.15);
}

.capa-code__header {
  background: #161b22;
  padding: 11px 16px;
  display: flex;
  align-items: center;
  gap: 7px;
  border-bottom: 1px solid #21262d;
}
.capa-code__dot {
  width: 11px;
  height: 11px;
  border-radius: 50%;
}

.capa-code__pre {
  padding: 1.3rem 1.4rem;
  font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', Consolas, monospace;
  font-size: 0.8rem;
  line-height: 1.75;
  color: #c9d1d9;
  overflow-x: auto;
  margin: 0;
}

.capa-code__list {
  list-style: none;
  padding: 0;
  margin: 0;
}
.capa-code__list li {
  padding: 11px 0;
  font-size: 0.95rem;
  color: #444;
  display: flex;
  align-items: center;
  gap: 12px;
  border-bottom: 1px solid #f0f0f0;
}
.capa-code__list li:last-child {
  border-bottom: none;
}
.capa-code__list .check {
  color: var(--capa-blue);
  font-weight: bold;
  font-size: 1.05rem;
}

/* ---------- Community Section ---------- */
.capa-community {
  padding: 4.5rem 1.5rem;
  background: linear-gradient(180deg, #f7f8ff 0%, #eef0ff 100%);
  text-align: center;
}

.capa-community__grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1.25rem;
  max-width: 780px;
  margin: 2rem auto 0;
}

.capa-community__card {
  background: #fff;
  border-radius: 14px;
  padding: 1.8rem 1.2rem;
  text-decoration: none !important;
  color: inherit !important;
  box-shadow: 0 2px 12px rgba(0,0,0,0.03);
  border: 1px solid rgba(79,108,255,0.05);
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
.capa-community__card:hover {
  transform: translateY(-5px);
  box-shadow: 0 12px 32px rgba(79,108,255,0.1);
  border-color: rgba(79,108,255,0.12);
}

.capa-community__icon {
  font-size: 1.5rem;
  margin-bottom: 0.8rem;
  color: var(--capa-blue);
}
.capa-community__card h4 {
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--capa-navy);
  margin-bottom: 0.35rem;
}
.capa-community__card p {
  font-size: 0.82rem;
  color: #999;
  margin: 0;
  line-height: 1.5;
}

/* ---------- Footer polish ---------- */
footer.td-footer {
  background: var(--capa-navy) !important;
}

/* ---------- Animations ---------- */
@keyframes fadeInDown {
  from { opacity: 0; transform: translateY(-24px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(24px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes bounce {
  0%, 20%, 50%, 80%, 100% { transform: translateX(-50%) translateY(0); }
  40% { transform: translateX(-50%) translateY(-8px); }
  60% { transform: translateX(-50%) translateY(-4px); }
}
@keyframes scrollDot {
  0% { opacity: 1; top: 6px; }
  100% { opacity: 0; top: 20px; }
}

/* ---------- Responsive ---------- */
@media (max-width: 768px) {
  .capa-features__grid,
  .capa-community__grid {
    grid-template-columns: 1fr;
    max-width: 400px;
    margin-left: auto;
    margin-right: auto;
  }
  .capa-code__grid {
    grid-template-columns: 1fr;
  }
  .capa-article__cover {
    height: 180px;
  }
  .capa-article__body {
    padding: 1.5rem;
  }
  .capa-hero {
    min-height: 85vh;
  }
  .capa-hero__title {
    letter-spacing: -0.5px;
  }
}
</style>
{{ end }}
