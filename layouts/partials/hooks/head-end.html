{{ if .IsHome }}
<style>
/* ========================================
   Capa Homepage Custom Styles
   ======================================== */

/* ---------- CSS Variables ---------- */
:root {
  --capa-navy: #0a0e27;
  --capa-indigo: #1a1a3e;
  --capa-blue: #4f6cff;
  --capa-blue-light: #6b85ff;
  --capa-cyan: #00d4ff;
  --capa-dark: #0f1629;
  --capa-text: #c9d1d9;
  --capa-muted: #8b949e;
}

/* ---------- Hero Section ---------- */
.capa-hero {
  position: relative;
  min-height: 92vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  background: var(--capa-navy);
}

.capa-hero__bg {
  position: absolute;
  inset: 0;
  background-image: url('/images/homepage/hero-bg.png');
  background-size: cover;
  background-position: center;
  opacity: 0.7;
}

.capa-hero__overlay {
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 50% 40%, rgba(79,108,255,0.12) 0%, transparent 60%),
              linear-gradient(180deg, rgba(10,14,39,0.3) 0%, rgba(10,14,39,0.8) 100%);
}

.capa-hero__content {
  position: relative;
  z-index: 2;
  text-align: center;
  padding: 2rem;
  max-width: 800px;
}

.capa-hero__badge {
  display: inline-block;
  padding: 6px 20px;
  border-radius: 20px;
  font-size: 0.8rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--capa-cyan);
  border: 1px solid rgba(0,212,255,0.25);
  background: rgba(0,212,255,0.06);
  margin-bottom: 1.5rem;
  animation: fadeInDown 0.8s ease-out;
}

.capa-hero__title {
  font-size: clamp(2.4rem, 5vw, 3.8rem);
  font-weight: 800;
  color: #fff;
  letter-spacing: -1px;
  line-height: 1.15;
  margin-bottom: 1rem;
  animation: fadeInDown 0.8s ease-out 0.1s both;
}

.capa-hero__title em {
  font-style: normal;
  background: linear-gradient(135deg, var(--capa-blue-light), var(--capa-cyan));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.capa-hero__subtitle {
  font-size: clamp(1rem, 2vw, 1.25rem);
  color: rgba(255,255,255,0.7);
  max-width: 580px;
  margin: 0 auto 2rem;
  line-height: 1.6;
  animation: fadeInDown 0.8s ease-out 0.2s both;
}

.capa-hero__actions {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
  animation: fadeInUp 0.8s ease-out 0.35s both;
}

.capa-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 12px 28px;
  border-radius: 8px;
  font-size: 0.95rem;
  font-weight: 600;
  text-decoration: none;
  transition: all 0.25s ease;
  border: none;
  cursor: pointer;
}

.capa-btn--primary {
  background: linear-gradient(135deg, var(--capa-blue), #3a50d9);
  color: #fff;
  box-shadow: 0 4px 20px rgba(79,108,255,0.35);
}
.capa-btn--primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 28px rgba(79,108,255,0.5);
  color: #fff;
  text-decoration: none;
}

.capa-btn--outline {
  background: rgba(255,255,255,0.06);
  color: #fff;
  border: 1px solid rgba(255,255,255,0.2);
}
.capa-btn--outline:hover {
  background: rgba(255,255,255,0.12);
  border-color: rgba(255,255,255,0.35);
  color: #fff;
  text-decoration: none;
}

.capa-hero__scroll {
  position: absolute;
  bottom: 2rem;
  left: 50%;
  transform: translateX(-50%);
  z-index: 2;
  animation: bounce 2s infinite;
}
.capa-hero__scroll span {
  display: block;
  width: 24px;
  height: 38px;
  border: 2px solid rgba(255,255,255,0.25);
  border-radius: 12px;
  position: relative;
}
.capa-hero__scroll span::after {
  content: '';
  width: 4px;
  height: 8px;
  background: rgba(255,255,255,0.5);
  border-radius: 2px;
  position: absolute;
  top: 6px;
  left: 50%;
  transform: translateX(-50%);
  animation: scrollDot 2s infinite;
}

/* ---------- Architecture Section ---------- */
.capa-arch {
  padding: 5rem 1rem;
  background: linear-gradient(180deg, #f6f8ff 0%, #fff 100%);
  text-align: center;
}

.capa-section-label {
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--capa-blue);
  margin-bottom: 0.5rem;
}

.capa-section-title {
  font-size: clamp(1.6rem, 3vw, 2.2rem);
  font-weight: 800;
  color: var(--capa-navy);
  margin-bottom: 0.5rem;
}

.capa-section-desc {
  font-size: 1.05rem;
  color: #666;
  max-width: 600px;
  margin: 0 auto 2.5rem;
}

.capa-arch__img {
  max-width: 720px;
  margin: 0 auto;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 8px 40px rgba(79,108,255,0.1), 0 2px 8px rgba(0,0,0,0.04);
  border: 1px solid rgba(79,108,255,0.08);
}
.capa-arch__img img {
  width: 100%;
  height: auto;
  display: block;
}

/* ---------- Features Section ---------- */
.capa-features {
  padding: 4rem 1rem;
  background: #fff;
}

.capa-features__grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 2rem;
  max-width: 960px;
  margin: 0 auto;
}

.capa-feature {
  text-align: center;
  padding: 2rem 1.5rem;
  border-radius: 16px;
  transition: all 0.3s ease;
}
.capa-feature:hover {
  background: #f8f9ff;
  transform: translateY(-4px);
  box-shadow: 0 12px 32px rgba(79,108,255,0.08);
}

.capa-feature__icon {
  width: 56px;
  height: 56px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.5rem;
  margin: 0 auto 1rem;
}

.capa-feature__title {
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--capa-navy);
  margin-bottom: 0.5rem;
}

.capa-feature__desc {
  font-size: 0.9rem;
  color: #666;
  line-height: 1.6;
}

/* ---------- Featured Article ---------- */
.capa-article {
  padding: 5rem 1rem;
  background: linear-gradient(180deg, var(--capa-navy) 0%, var(--capa-dark) 100%);
}

.capa-article__card {
  max-width: 880px;
  margin: 0 auto;
  background: linear-gradient(135deg, #141b33, #1c2545);
  border-radius: 20px;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.06);
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  transition: transform 0.3s ease;
}
.capa-article__card:hover {
  transform: translateY(-4px);
}

.capa-article__cover {
  width: 100%;
  height: 280px;
  object-fit: cover;
  display: block;
}

.capa-article__body {
  padding: 2rem 2.5rem 2.5rem;
}

.capa-article__title {
  font-size: 1.6rem;
  font-weight: 700;
  color: #fff;
  margin-bottom: 0.75rem;
  line-height: 1.3;
}
.capa-article__title a {
  color: #fff;
  text-decoration: none;
}
.capa-article__title a:hover {
  color: var(--capa-cyan);
}

.capa-article__excerpt {
  font-size: 0.95rem;
  color: var(--capa-muted);
  line-height: 1.7;
  margin-bottom: 1.5rem;
}

.capa-article__tags {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 1.5rem;
}
.capa-article__tag {
  background: rgba(79,108,255,0.12);
  color: var(--capa-blue-light);
  padding: 4px 12px;
  border-radius: 6px;
  font-size: 0.78rem;
  font-weight: 500;
}

/* ---------- Code Section ---------- */
.capa-code {
  padding: 4rem 1rem;
  background: #fff;
}

.capa-code__grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 3rem;
  max-width: 960px;
  margin: 0 auto;
  align-items: center;
}

.capa-code__block {
  background: #0d1117;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 8px 32px rgba(0,0,0,0.12);
  border: 1px solid #30363d;
}

.capa-code__header {
  background: #161b22;
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 6px;
  border-bottom: 1px solid #30363d;
}
.capa-code__dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
}

.capa-code__pre {
  padding: 1.25rem;
  font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', Consolas, monospace;
  font-size: 0.82rem;
  line-height: 1.7;
  color: #c9d1d9;
  overflow-x: auto;
  margin: 0;
}

.capa-code__list {
  list-style: none;
  padding: 0;
  margin: 0;
}
.capa-code__list li {
  padding: 10px 0;
  font-size: 1rem;
  color: #444;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid #f0f0f0;
}
.capa-code__list li:last-child {
  border-bottom: none;
}
.capa-code__list .check {
  color: var(--capa-blue);
  font-weight: bold;
  font-size: 1.1rem;
}

/* ---------- Community Section ---------- */
.capa-community {
  padding: 4rem 1rem;
  background: linear-gradient(180deg, #f8f9ff 0%, #f0f2ff 100%);
  text-align: center;
}

.capa-community__grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1.5rem;
  max-width: 800px;
  margin: 2rem auto 0;
}

.capa-community__card {
  background: #fff;
  border-radius: 12px;
  padding: 1.5rem;
  text-decoration: none;
  color: inherit;
  box-shadow: 0 2px 12px rgba(0,0,0,0.04);
  border: 1px solid rgba(79,108,255,0.06);
  transition: all 0.25s ease;
}
.capa-community__card:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 24px rgba(79,108,255,0.12);
  text-decoration: none;
  color: inherit;
  border-color: rgba(79,108,255,0.15);
}

.capa-community__icon {
  font-size: 1.6rem;
  margin-bottom: 0.75rem;
}
.capa-community__card h4 {
  font-size: 1rem;
  font-weight: 700;
  color: var(--capa-navy);
  margin-bottom: 0.4rem;
}
.capa-community__card p {
  font-size: 0.85rem;
  color: #888;
  margin: 0;
}

/* ---------- Animations ---------- */
@keyframes fadeInDown {
  from { opacity: 0; transform: translateY(-20px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes bounce {
  0%, 20%, 50%, 80%, 100% { transform: translateX(-50%) translateY(0); }
  40% { transform: translateX(-50%) translateY(-8px); }
  60% { transform: translateX(-50%) translateY(-4px); }
}
@keyframes scrollDot {
  0% { opacity: 1; top: 6px; }
  100% { opacity: 0; top: 18px; }
}

/* ---------- Override Docsy defaults on homepage ---------- */
.td-home .td-main {
  padding-top: 0 !important;
}
body.td-home .td-outer {
  padding-top: 0 !important;
}
/* Hide default Docsy cover on homepage since we use custom hero */
body.td-home .td-cover-block {
  display: none !important;
}

/* ---------- Responsive ---------- */
@media (max-width: 768px) {
  .capa-features__grid,
  .capa-community__grid {
    grid-template-columns: 1fr;
  }
  .capa-code__grid {
    grid-template-columns: 1fr;
  }
  .capa-article__cover {
    height: 180px;
  }
  .capa-article__body {
    padding: 1.5rem;
  }
  .capa-hero {
    min-height: 80vh;
  }
}
</style>
{{ end }}
